name: Bug report
description: Report a defect in the AWS Network Firewall Security Hub
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Commands to reproduce (e.g., make validate, terraform validate).
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Terraform version, AWS provider version, OS.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
    validations:
      required: false