name: tests

on:
  pull_request:
    paths:
      - "tests/**"
      - "scripts/**"
      - "rules/**"
      - "terraform/**"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -U pytest
      - run: pytest -q

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          additional_paths: scripts

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -U yamllint
      - run: yamllint -d "rules:line-length: disable" .