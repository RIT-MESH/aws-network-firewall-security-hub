name: terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to immutable commit SHAs (tags can move).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.5"
          terraform_wrapper: false

      - name: terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: terraform init (backend=false)
        working-directory: terraform
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: latest
      - name: tflint --init (install aws ruleset)
        working-directory: terraform
        run: tflint --init
      - name: tflint (blocking)
        working-directory: terraform
        run: tflint --recursive
