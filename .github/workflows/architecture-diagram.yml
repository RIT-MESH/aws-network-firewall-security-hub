name: architecture-diagram

on:
  pull_request:
    paths:
      - "architecture/diagrams/**"
      - "terraform/**"
      - ".github/workflows/architecture-diagram.yml"
  push:
    branches: [main]
    paths:
      - "architecture/diagrams/**"
      - "terraform/**"
      - ".github/workflows/architecture-diagram.yml"

permissions:
  contents: read

jobs:
  generate-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install diagrams package
        run: python -m pip install -r architecture/diagrams/requirements.txt

      - name: Generate architecture diagram
        run: python architecture/diagrams/generate_architecture.py

      - name: Verify generated artifacts
        run: |
          set -euo pipefail
          for f in architecture/diagrams/aws-network-firewall-architecture.png \
                   architecture/diagrams/aws-network-firewall-architecture.svg; do
            if [ ! -s "$f" ]; then
              echo "::error::$f is missing or empty."
              exit 1
            fi
          done
          # Validate SVG is well-formed XML.
          python -c "import xml.dom.minidom, sys; xml.dom.minidom.parse('architecture/diagrams/aws-network-firewall-architecture.svg'); print('SVG is valid XML')"
          echo "Architecture diagram artifacts generated and verified."

      - name: Check for stale source changes
        run: |
          # If the generator source or Terraform files changed in this commit
          # but the diagram artifacts did not, warn the contributor.
          if git diff --name-only HEAD~1 HEAD -- architecture/diagrams/generate_architecture.py terraform/ | grep -q .; then
            if ! git diff --name-only HEAD~1 HEAD -- architecture/diagrams/aws-network-firewall-architecture.svg | grep -q .; then
              echo "::warning::Architecture source changed but SVG was not updated. Regenerate locally and commit."
            fi
          fi
